maior

Aqui está uma versão ainda maior, onde o logo ocupa praticamente toda a área central do SVG, ideal para splash screen ou tela inicial.

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">

  <!-- Fundo verde -->
  <rect width="100%" height="100%" fill="#1f3a1f"/>

  <!-- Ícone muito maior -->
  <g fill="none" stroke="#f5f5e6" stroke-width="20" stroke-linecap="round" transform="translate(500,300)">
    
    <!-- círculo -->
    <circle cx="0" cy="0" r="150"/>

    <!-- folhas -->
    <path d="M0 120 C -70 40 -70 -40 0 -110"/>
    <path d="M0 120 C 70 40 70 -40 0 -110"/>
    <path d="M0 120 C 0 40 0 -40 0 -110"/>
  </g>

  <!-- Texto principal gigante -->
  <text 
    x="500" 
    y="650" 
    text-anchor="middle" 
    fill="#f5f5e6"
    font-size="220"
    font-family="Signatura Monoline, cursive">
    la nonna
  </text>

  <!-- Subtexto maior -->
  <text 
    x="500" 
    y="780" 
    text-anchor="middle" 
    fill="#f5f5e6"
    font-size="90"
    font-family="sans-serif"
    letter-spacing="10">
    • Café •
  </text>

</svg>

✅ Agora:

    Ícone 150px de raio

    Texto 220px (bem dominante)

    Subtexto 90px

    Logo ocupa quase toda a tela

