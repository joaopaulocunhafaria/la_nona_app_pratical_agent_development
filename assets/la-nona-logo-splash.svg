faça o logo ainda e as descrições ainda maiores

Aqui está uma versão do SVG com o logo e os textos bem maiores, ocupando mais o centro da tela e com melhor destaque visual.

✅ Melhorias desta versão

    Ícone ~60% maior

    Texto “la nonna” bem mais destacado

    “• Café •” maior

    Melhor equilíbrio visual no centro

💡 Se quiser, posso também:

