spring:
  application:
    name: api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/la_nona}
    username: ${DB_USERNAME:icismep}
    password: ${DB_PASSWORD:icismep}

  jpa:
    open-in-view: false
    hibernate:
      # Nunca usar 'update'/'create' aqui: o schema e' sempre gerenciado pelo Flyway
      # (src/main/resources/db/migration). Ver SPRINGBOOT.md secao 3.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        # O banco 'la_nona' e' compartilhado com outros projetos (mesmo Postgres);
        # tudo desta API fica isolado no schema dedicado abaixo, nunca em 'public'.
        default_schema: ${DB_SCHEMA:la_nona_api}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ${DB_SCHEMA:la_nona_api}
    create-schema: true
    baseline-on-migrate: false

server:
  # No Render (Docker) a porta e injetada pela variavel PORT; localmente cai em SERVER_PORT/8080.
  port: ${PORT:${SERVER_PORT:8080}}
  error:
    # FallbackErrorController (com.lanona.api.exception) ja substitui o corpo padrao do Spring Boot;
    # estas flags sao uma segunda camada de protecao para nunca expor path/stacktrace ao cliente.
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# Configuracao propria da aplicacao (ver SPRINGBOOT.md secao 5 - Seguranca)
app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-prod-please-0123456789}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}      # 1h
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000} # 30 dias
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}

# Armazenamento de imagens no Amazon S3 (ver ConfiguracaoAws/S3StorageService).
# As imagens NUNCA sao gravadas no banco: o upload vai para o bucket e somente a
# URL publica do objeto e' persistida. Para apontar para um bucket real basta
# definir as variaveis de ambiente abaixo (nada mais precisa mudar no codigo):
#   AWS_ACCESS_KEY / AWS_SECRET_KEY  -> credenciais IAM (NUNCA versionar reais)
#   AWS_REGION                       -> regiao do bucket (ex.: sa-east-1)
#   AWS_S3_URL                       -> endpoint base para montar a URL publica
#   AWS_S3_BUCKET                    -> nome do bucket
# Em ambientes AWS (EC2/ECS/EKS) prefira IAM Roles e deixe accessKey/secretKey
# vazios — o SDK resolve as credenciais via DefaultAWSCredentialsProviderChain.
amazon:
  accessKey: ${AWS_ACCESS_KEY:}
  secretKey: ${AWS_SECRET_KEY:}
  region: ${AWS_REGION:sa-east-1}
  s3:
    url: ${AWS_S3_URL:https://s3.sa-east-1.amazonaws.com}
    bucketName: ${AWS_S3_BUCKET:la-nona-images}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

# Actuator: expoe somente o health (usado como Health Check pelo Render).
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.lanona.api: INFO

---
spring:
  config:
    activate:
      on-profile: dev

app:
  cors:
    # Permite acessar a API a partir de outros dispositivos na rede local (ex.: celular)
    # durante o desenvolvimento, alem do localhost padrao.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://192.168.*.*:*,http://10.*.*.*:*}

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.lanona.api: DEBUG

# O perfil 'prod' fica em application-prod.yml (ativado por SPRING_PROFILES_ACTIVE=prod).
