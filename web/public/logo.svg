<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">

  <!-- Fundo verde -->
  <rect width="100%" height="100%" fill="#1F3D1F"/>

  <!-- Ícone café -->
  <g transform="translate(512,300)" stroke="#F2F1E8" stroke-width="10" fill="none">
    
    <!-- círculo externo -->
    <circle r="90"/>

    <!-- folhas inferiores -->
    <path d="M-70 30 Q-20 80 0 90 Q-10 40 -70 30"/>
    <path d="M70 30 Q20 80 0 90 Q10 40 70 30"/>

    <!-- grão central -->
    <path d="M0 -60 C30 -20 30 20 0 60 C-30 20 -30 -20 0 -60"/>
    
    <!-- divisórias -->
    <line x1="-90" y1="30" x2="90" y2="30"/>
  </g>

  <!-- Texto principal -->
  <text x="50%" y="520"
        text-anchor="middle"
        fill="#F2F1E8"
        font-size="120"
        font-family="Brush Script MT, Pacifico, cursive">
        la nonna
  </text>

  <!-- Subtexto -->
  <text x="50%" y="610"
        text-anchor="middle"
        fill="#F2F1E8"
        font-size="50"
        font-family="Poppins, Montserrat, sans-serif"
        letter-spacing="4">
        • Café •
  </text>

</svg>