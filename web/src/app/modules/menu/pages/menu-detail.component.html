<app-page-header titulo="Detalhes do Item">
	@if (item()) {
		<button
			type="button"
			class="-mr-2 flex h-10 w-10 flex-shrink-0 items-center justify-center text-2xl"
			style="color: var(--text-on-dark)"
			(click)="alternarFavorito()"
		>
			<i class="pi" [class.pi-heart-fill]="isFavorito()" [class.pi-heart]="!isFavorito()"></i>
		</button>
	}
</app-page-header>

@if (carregando()) {
	<div class="flex justify-center py-12">
		<p-progressSpinner></p-progressSpinner>
	</div>
} @else if (item()) {
	<div class="mx-auto flex max-w-2xl flex-col gap-4 pb-24">
		@if (imagens().length > 0) {
			<p-galleria
				[value]="imagens()"
				[showThumbnails]="imagens().length > 1"
				[showIndicators]="imagens().length > 1"
				[circular]="true"
				[containerStyle]="{ 'max-width': '100%' }"
			>
				<ng-template pTemplate="item" let-imagem>
					<img [src]="imagem" class="h-80 w-full object-cover" alt="Imagem do item" />
				</ng-template>
				<ng-template pTemplate="thumbnail" let-imagem>
					<img [src]="imagem" class="h-16 w-16 object-cover" alt="Miniatura" />
				</ng-template>
			</p-galleria>
		} @else {
			<div class="flex h-64 w-full items-center justify-center" style="background-color: var(--surface-soft-green)">
				<i class="pi pi-image text-5xl" style="color: var(--secondary-light)"></i>
			</div>
		}

		<div class="flex flex-col gap-3 px-4">
			<h2 class="text-2xl font-extrabold" style="color: var(--secondary-base)">{{ item()!.name }}</h2>

			<div class="flex gap-2">
				<p-tag [value]="item()!.category" severity="success"></p-tag>
				<p-tag [value]="statusLabel()" [severity]="statusSeverity()"></p-tag>
			</div>

			<div class="flex flex-col gap-1.5 rounded-xl p-4" style="background-color: var(--surface-soft-green)">
				<span class="text-xs font-semibold tracking-wide uppercase" style="color: var(--secondary-base)">Descrição</span>
				<p class="text-base font-bold leading-relaxed whitespace-pre-line" style="color: var(--secondary-base)">{{ item()!.description }}</p>
			</div>

			<div class="rounded-lg p-4" style="background-color: var(--surface-soft-green)">
				<span class="text-2xl font-bold" style="color: var(--secondary-base)">{{ item()!.price | brl }}</span>
			</div>
		</div>
	</div>

	@if (podePedir()) {
		<div class="fixed right-0 bottom-0 left-0 border-t bg-white p-4">
			<button
				pButton
				label="Adicionar ao Carrinho"
				icon="pi pi-shopping-cart"
				class="mx-auto block w-full max-w-2xl"
				(click)="adicionarAoCarrinho()"
			></button>
		</div>
	}
}
